[project]
name = "biorxiv-mcp"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["mcp[cli]", "httpx", "uvicorn", "starlette", "sse-starlette"]

[project.optional-dependencies]
test = ["pytest", "pytest-asyncio"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"
